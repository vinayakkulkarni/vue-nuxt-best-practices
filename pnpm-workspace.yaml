packages:
  - skills/*
  - www
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  vue-demi: true
minimumReleaseAgeExclude:
  - lint-staged@17.1.0
  - nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - vue
  - '@vue/*'
  - unhead
  - '@unhead/*'
overrides:
  # nuxt/nuxt#35670: 4.5.0 cloudflare preset build fails parsing
  # unhead/dist/stream/iife.mjs; fixed in unhead 3.2.0+
  unhead: '>=3.2.1'
